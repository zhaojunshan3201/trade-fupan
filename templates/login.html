{% extends "base.html" %}
{% block title %}登录 - 交易复盘系统{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2 style="text-align:center;margin-bottom:24px">🔐 登录</h2>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" required>
            </div>
            <div class="form-group">
                <label style="font-size:13px">
                    <input type="checkbox" name="remember"> 保持登录
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">登录</button>
        </form>
        <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-dim)">
            没有账户？<a href="/register">立即注册</a>
        </p>
    </div>
</div>
{% endblock %}
{% block head %}
<style>
.auth-page { display:flex; align-items:center; justify-content:center; min-height:70vh; }
.auth-card { width:100%; max-width:400px; background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
</style>
{% endblock %}
