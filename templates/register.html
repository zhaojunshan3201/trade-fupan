{% extends "base.html" %}
{% block title %}注册 - 交易复盘系统{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2 style="text-align:center;margin-bottom:24px">📝 注册</h2>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">用户名 *</label>
                <input type="text" name="username" class="form-input" required autofocus minlength="3" maxlength="50" placeholder="至少3位">
            </div>
            <div class="form-group">
                <label class="form-label">邮箱（可选）</label>
                <input type="email" name="email" class="form-input" placeholder="用于找回密码">
            </div>
            <div class="form-group">
                <label class="form-label">密码 *</label>
                <input type="password" name="password" class="form-input" required minlength="6" placeholder="至少6位">
            </div>
            <div class="form-group">
                <label class="form-label">确认密码 *</label>
                <input type="password" name="password2" class="form-input" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">注册</button>
        </form>
        <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-dim)">
            已有账户？<a href="/login">去登录</a>
        </p>
    </div>
</div>
{% endblock %}
{% block head %}
<style>
.auth-page { display:flex; align-items:center; justify-content:center; min-height:70vh; }
.auth-card { width:100%; max-width:400px; background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
</style>
{% endblock %}
